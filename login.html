<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Low Hall League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border-t-8 border-red-600 p-8">
        <h1 class="text-3xl font-black italic mb-2 text-center">
            LOW HALL <span class="text-red-600">ADMIN</span>
        </h1>
        <p class="text-sm text-gray-500 text-center mb-8">Dashboard login</p>

        <form id="login-form" class="space-y-4">
            <input
                id="email"
                type="email"
                placeholder="Email"
                class="w-full border rounded-lg p-3"
                required
            />
            <input
                id="password"
                type="password"
                placeholder="Password"
                class="w-full border rounded-lg p-3"
                required
            />
            <button
                type="submit"
                class="w-full bg-red-600 text-white font-black rounded-lg px-5 py-3"
            >
                Sign in
            </button>
        </form>

        <p id="login-message" class="mt-4 text-sm font-bold text-center"></p>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-red-600">Back to site</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
